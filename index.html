<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Crear Ruta</title>
  </head>
  <body>
    <h1>Crear Ruta de Recolección</h1>

    <form id="ruta-form">
      <label>Nombre de la ruta:</label>
      <input type="text" id="nombre-ruta" />

      <label>Zona:</label>
      <input type="text" id="zona" />

      <label>Puntos:</label>
      <textarea id="puntos"></textarea>

      <input type="submit" value="Crear Ruta" />
    </form>

    <div id="mensaje"></div>

    <h2>Lista de rutas</h2>
    <ul id="lista-rutas"></ul>

    <script type="module" src="./src/presenter.js"></script>
  </body>
</html>
