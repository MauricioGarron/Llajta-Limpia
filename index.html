<!DOCTYPE html>
<html xml:lang="es">
  <head>
    <title>Rutas por Zona</title>
  </head>
  <body>
    <h1>Crear Ruta por Zona</h1>

    <form id="ruta-form">
      <label>Zona:</label>
      <input type="text" id="zona" />

      <label>Ruta:</label>
      <input type="text" id="ruta" />

      <input type="submit" value="Guardar" />
    </form>

    <h2>Ver rutas</h2>

    <select id="filtro-zona">
      <option value="">Selecciona zona</option>
    </select>

    <div id="resultado-div"></div>

    <script type="module" src="./src/presenter.js"></script>
  </body>
</html>
