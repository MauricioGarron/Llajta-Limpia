<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Rutas y Horarios</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>

    <h1>Llajta Limpia</h1>
    
    <h2>Crear Ruta por Zona</h2>

    <form id="ruta-form">
      <label>Zona:</label>
      <input type="text" id="zona" required />

      <label>Ruta:</label>
      <input type="text" id="ruta" required />

      <button type="submit">Guardar Ruta</button>
    </form>

    <h2>Ver rutas</h2>
    <p><small>Pista: Puedes editar o eliminar rutas directamente en la lista.</small></p>

    <select id="filtro-zona">
      <option value="">Selecciona zona</option>
    </select>

    <div id="resultado-div"></div>

    <hr />

    <h2>Crear Horario</h2>

    <form id="horario-form">
      <label>Ruta:</label>
      <input type="text" id="horario-ruta" required />

      <label>Día:</label>
      <input type="text" id="dia" required />

      <label>Hora:</label>
      <input type="text" id="hora" required />

      <button type="submit">Guardar Horario</button>
    </form>

    <h2>Ver horarios por ruta</h2>

    <div class="buscador-ruta">
      <input type="text" id="buscar-ruta" placeholder="Ingrese ruta" />
      <button id="btn-buscar">Buscar</button>
    </div>

    <div id="horarios-div"></div>
    <hr />

    <h2>Ver horarios por zona</h2>
    <select id="filtro-zona-horarios">
      <option value="">Selecciona zona</option>
    </select>
    <div id="horarios-zona-div"></div>
    
    <hr />

    <h2>Crear reporte de basura</h2>

    <form id="reporte-form">
      <label>Zona:</label>
      <input type="text" id="reporte-zona" required />

      <label>Dirección:</label>
      <input type="text" id="reporte-direccion" required />

      <label>Descripción:</label>
      <input type="text" id="reporte-descripcion" required />

      <button type="submit">Enviar reporte</button>
    </form>

    <div id="mensaje-reporte"></div>

    <hr />

    <h2>Ver reportes de basura</h2>

    <button id="ver-reportes">Mostrar reportes</button>

    <div id="mensaje-lista-reportes"></div>

    <ul id="lista-reportes"></ul>

    <script type="module" src="./src/presenter.js"></script>
  </body>
</html>
